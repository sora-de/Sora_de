name: sorade
description: Sora de — gifting & photobooth business management (Firebase + Firestore).
publish_to: "none"
version: 1.0.0+4

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  uuid: ^4.5.1
  intl: ^0.20.2
  provider: ^6.1.2
  share_plus: ^10.1.4
  flutter_svg: ^2.0.17
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: logo/transparent_logo.png
  adaptive_icon_background: "#FDFBF7"
  adaptive_icon_foreground: logo/transparent_logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
