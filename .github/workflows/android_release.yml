# Builds a release APK and publishes a GitHub Release (asset: sorade-android.apk).
#
# Triggers
#   • Push git tag vX.Y.Z-BUILD matching pubspec (e.g. pubspec 1.0.2+7 → tag v1.0.2-7)
#   • Workflow dispatch — same tag derived from pubspec on the branch you run
#
# Repo: Settings → Actions → General → Workflow permissions → Read and write.
#
# Optional secret: FIREBASE_SERVICE_ACCOUNT_JSON — service account JSON with permission to
# write Firestore (Admin SDK bypasses security rules). Updates app_config/android.
#
name: Android release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse pubspec version
        id: meta
        run: |
          set -e
          line=$(grep '^version:' pubspec.yaml | head -1 | tr -d '\r')
          raw=$(echo "$line" | sed 's/^version:[[:space:]]*//')
          name=$(echo "$raw" | cut -d'+' -f1)
          build=$(echo "$raw" | cut -d'+' -f2)
          if [ -z "$build" ] || [ "$build" = "$raw" ]; then
            echo "pubspec version must include +buildNumber, e.g. 1.0.1+2" >&2
            exit 1
          fi
          tag="v${name}-${build}"
          echo "version_name=$name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build" >> "$GITHUB_OUTPUT"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Parsed version $name build $build → release tag $tag"

      - name: Verify git tag matches pubspec
        if: github.ref_type == 'tag'
        run: |
          expected="${{ steps.meta.outputs.release_tag }}"
          actual="${{ github.ref_name }}"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Git tag '$actual' does not match pubspec. Expected tag '$expected' (from version in pubspec.yaml)."
            exit 1
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Same signing key as local release builds → sideload updates install over existing app.
      # Optional secrets: ANDROID_KEYSTORE_BASE64 (base64 of upload-keystore.jks), ANDROID_STORE_PASSWORD,
      # ANDROID_KEY_PASSWORD, ANDROID_KEY_ALIAS (e.g. upload). If unset, CI uses its debug keystore (conflicts with phone installs from another machine).
      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "::notice::No release keystore secrets — APK signed with CI debug key. Uninstall the app before sideloading, or add ANDROID_* signing secrets."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          printf '%s\n' \
            "storePassword=${ANDROID_STORE_PASSWORD}" \
            "keyPassword=${ANDROID_KEY_PASSWORD}" \
            "keyAlias=${ANDROID_KEY_ALIAS}" \
            "storeFile=upload-keystore.jks" \
            > android/key.properties

      - run: flutter build apk --release

      - name: Stage APK for release
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk sorade-android.apk
          ls -la sorade-android.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: Sora de ${{ steps.meta.outputs.version_name }} (${{ steps.meta.outputs.build_number }})
          body: |
            **Version:** `${{ steps.meta.outputs.version_name }}`  
            **Build:** `${{ steps.meta.outputs.build_number }}`

            Download **sorade-android.apk** below. On Android, allow install from your browser or Files app if asked, then open the file.

            **Firestore `downloadUrl` (copy into `app_config/android`):**
            ```
            https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.release_tag }}/sorade-android.apk
            ```
          files: sorade-android.apk
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Compute APK download URL
        id: apk
        run: |
          url="https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.release_tag }}/sorade-android.apk"
          echo "download_url=$url" >> "$GITHUB_OUTPUT"
          echo "APK URL: $url"

      # secrets.* cannot be used in step `if:` (GitHub restriction). Skip inside the script when unset.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Does not fail the job: release APK is already published. Enable Cloud Firestore API in GCP if this errors.
      - name: Update Firestore app_config/android
        id: firestore_app_config
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          APK_DOWNLOAD_URL: ${{ steps.apk.outputs.download_url }}
          LATEST_BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
          VERSION_LABEL: ${{ steps.meta.outputs.version_name }}
        run: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "::notice::Skipping Firestore update (add secret FIREBASE_SERVICE_ACCOUNT_JSON to enable)."
            exit 0
          fi
          npm install firebase-admin@12.7.0 --no-save
          export RELEASE_NOTES="$(git log -1 --pretty=%B | head -c 2000)"
          node tool/ci/update_firestore_app_config.cjs

      - name: Firestore update hint
        if: steps.firestore_app_config.outcome == 'failure'
        run: |
          echo "::warning::Firestore step failed. Common fixes: (1) Enable **Cloud Firestore API** in Google Cloud. (2) In Firebase Console → **Firestore** → **Create database** (Native mode) if you never did — NOT_FOUND often means no DB yet. (3) Service account JSON must be for the same project as the app. Set app_config/android manually if needed. See docs/DEPLOY_GITHUB_ANDROID.md"
